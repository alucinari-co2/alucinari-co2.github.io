name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  # REQUIRED for Trivy to upload findings to the Security tab
  security-events: write 

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy scanner
        # Using v0.35.0 specifically due to the March 2026 supply chain attack
        uses: aquasecurity/trivy-action@v0.35.0 
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Prevents job failure so the upload step can run

      - name: Upload Trivy results to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    # Switched from container to the official Action for better stability
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
          # Use 'audit' if you don't want it to block the PR, 
          # or keep empty to fail on findings
          # generateSarif: "1" 

  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install vnu-jar
        run: npm install -g vnu-jar
      - name: Run Nu HTML Checker
        run: |
          find . -name "*.html" \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            -print0 | xargs -0 vnu --errors-only
